<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trò Chơi Trắc Nghiệm Vui Nhộn</title>
    <!-- Font chữ cho trẻ em -->
    <link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@400;600;800&display=swap" rel="stylesheet">
    <!-- Thư viện tạo pháo hoa -->
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --primary: #FF6B6B;
            --secondary: #4ECDC4;
            --accent: #FFE66D;
            --dark: #2C3E50;
            --light: #F7F9F9;
            --success: #2ECC71;
            --danger: #E74C3C;
        }

        body {
            margin: 0;
            padding: 0;
            font-family: 'Baloo 2', cursive;
            background: linear-gradient(135deg, #a8edea 0%, #fed6e3 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: var(--dark);
        }

        .container {
            width: 100%;
            max-width: 800px;
            background: rgba(255, 255, 255, 0.95);
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
            padding: 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        h1 {
            color: var(--primary);
            font-size: 2.5rem;
            margin-bottom: 20px;
            text-shadow: 2px 2px 0px var(--accent);
        }

        /* Các màn hình */
        .screen { display: none; }
        .screen.active { display: block; animation: fadeIn 0.5s ease; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Input & Buttons */
        input[type="text"] {
            width: 80%;
            padding: 15px;
            font-size: 1.2rem;
            border: 3px solid var(--secondary);
            border-radius: 10px;
            font-family: inherit;
            margin-bottom: 20px;
            outline: none;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            font-size: 1.2rem;
            font-family: inherit;
            font-weight: bold;
            border-radius: 50px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 5px 15px rgba(255, 107, 107, 0.4);
            margin: 5px;
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(255, 107, 107, 0.6);
        }

        /* Khung câu hỏi */
        .header-game {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 1.2rem;
            font-weight: bold;
            border-bottom: 2px dashed #ccc;
            padding-bottom: 10px;
            margin-bottom: 20px;
        }

        .question {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 20px;
            color: var(--dark);
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-bottom: 20px;
        }

        .option-btn {
            background: var(--light);
            color: var(--dark);
            border: 3px solid var(--secondary);
            border-radius: 15px;
            font-size: 1.2rem;
            box-shadow: none;
            padding: 15px;
        }

        .option-btn:hover { background: var(--secondary); color: white; }
        .option-btn.correct { background: var(--success); color: white; border-color: var(--success); }
        .option-btn.wrong { background: var(--danger); color: white; border-color: var(--danger); }
        .option-btn:disabled { cursor: not-allowed; transform: none; }

        /* Bảng xếp hạng */
        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }
        th, td {
            padding: 12px;
            border-bottom: 1px solid #ddd;
            text-align: left;
        }
        th { background-color: var(--secondary); color: white; }
        tr:nth-child(even) { background-color: #f2f2f2; }

        #btn-next { display: none; background: var(--secondary); }
    </style>
</head>
<body>

<div class="container">
    <!-- MÀN HÌNH 1: NHẬP TÊN -->
    <div id="screen-login" class="screen active">
        <h1>🌟 Chinh Phục Kiến Thức 🌟</h1>
        <p>Nhập tên của em để bắt đầu cuộc hành trình nào!</p>
        <input type="text" id="player-name" placeholder="Ví dụ: Nguyễn Văn A" autocomplete="off">
        <br>
        <button onclick="startGame()">Bắt Đầu Chơi!</button>
    </div>

    <!-- MÀN HÌNH 2: CHƠI GAME -->
    <div id="screen-game" class="screen">
        <div class="header-game">
            <div id="level-display">Màn: 1</div>
            <div id="player-display">Người chơi: ???</div>
            <div id="score-display">Điểm: 0</div>
            <div id="time-display">⏰ 00:00</div>
        </div>
        <div class="question" id="question-text">Câu hỏi hiển thị ở đây?</div>
        <div class="options-grid" id="options-container">
            <!-- Các nút đáp án sẽ được tạo tự động bằng JS -->
        </div>
        <button id="btn-next" onclick="nextQuestion()">Câu Tiếp Theo ➔</button>
    </div>

    <!-- MÀN HÌNH 3: KẾT QUẢ & BẢNG XẾP HẠNG -->
    <div id="screen-result" class="screen">
        <h1>🎉 Chúc mừng em đã hoàn thành! 🎉</h1>
        <h2 id="final-score">Điểm của em: 0</h2>
        <p id="final-stats">Đúng: 0 | Sai: 0 | Thời gian: 0s</p>
        
        <h3>🏆 BẢNG XẾP HẠNG 🏆</h3>
        <table>
            <thead>
                <tr>
                    <th>Hạng</th>
                    <th>Tên</th>
                    <th>Điểm</th>
                    <th>Đúng</th>
                    <th>Sai</th>
                    <th>Thời gian</th>
                </tr>
            </thead>
            <tbody id="leaderboard-body">
                <!-- Data đổ vào đây -->
            </tbody>
        </table>
        <br>
        <button onclick="location.reload()">Chơi Lại</button>
    </div>
</div>

<script>
    // --- DỮ LIỆU CÂU HỎI ---
    const allQuestions = [
        // MÀN 1 (Dễ)
        { q: "Từ nói lên tình cảm của thiếu nhi với Bác Hồ là:", opts: ["A. Kính yêu", "B. Kính râm", "C. Quan tâm", "D. Giúp đỡ"], ans: 0, level: 1 },
        { q: "Từ nào là từ chỉ sự vật?", opts: ["A. Nhảy", "B. Cây bút", "C. Xanh", "D. Ngọt"], ans: 1, level: 1 },
        { q: "Một năm bắt đầu bằng mùa nào?", opts: ["A. Mùa xuân", "B. Mùa thu", "C. Mùa đông", "D. Mùa hè"], ans: 0, level: 1 },
        { q: "Bánh chưng có dạng hình gì?", opts: ["A. Hình tròn", "B. Hình vuông", "C. Hình tam giác", "D. Hình chữ nhật"], ans: 1, level: 1 },
        { q: "Anh của bố thì gọi là…", opts: ["A. Chú", "B. Bác", "C. Cậu", "D. Dì"], ans: 1, level: 1 },
        { q: "Đồ vật ở trường bắt đầu bằng chữ Tr dùng để báo giờ vào học là cái gì?", opts: ["A. Thước kẻ", "B. Tủ sách", "C. Tập vở", "D. Trống trường"], ans: 3, level: 1 },
        { q: "Trong câu “Em bé đang ngủ ngon”, từ nào chỉ hoạt động?", opts: ["A. Em bé", "B. Đang", "C. Ngủ", "D. Ngon"], ans: 2, level: 1 },
        { q: "Khi viết chữ có các nguyên âm i, e, ê đứng sau, âm /cờ/ ở đầu tiếng ta viết bằng chữ gì?", opts: ["A. c", "B. q", "C. k", "D. gh"], ans: 2, level: 1 },
        { q: "Dòng nào chỉ gồm các từ chỉ đặc điểm?", opts: ["A. Rực rỡ, xanh tươi, kì diệu.", "B. Rực rỡ, xanh tươi, hót.", "C. Xanh tươi, kì diệu, mây.", "D. Xanh tươi, núi sông, rực rỡ."], ans: 0, level: 1 },
        { q: "Câu nào là câu giới thiệu?", opts: ["A. Đất nước mình thật tươi đẹp", "B. Mái tóc của mẹ mượt mà.", "C. Em là học sinh lớp hai.", "D. Hôm nay em đi thi."], ans: 2, level: 1 },
        
        // MÀN 2 (Trung bình)
        { q: "Từ ngữ nào sau đây là từ chỉ hoạt động bảo vệ, chăm sóc cây?", opts: ["A. tưới cây", "B. nhổ cây", "C. giẫm lên cỏ", "D. hái hoa"], ans: 0, level: 2 },
        { q: "Câu ca dao “Một cây làm chẳng nên non...” khuyên chúng ta điều gì?", opts: ["A. Phải làm việc thật nhanh", "B. Một người làm việc tốt hơn nhiều người", "C. Đoàn kết, cùng nhau hợp sức", "D. Dựa vào người khác"], ans: 2, level: 2 },
        { q: "Khi làm việc nhóm, bạn chưa hoàn thành, các bạn khác cùng hỗ trợ cho thấy:", opts: ["A. Không cần làm việc chung", "B. Mỗi người làm riêng", "C. Biết hợp tác, giúp đỡ nhau", "D. Chỉ một bạn làm"], ans: 2, level: 2 },
        { q: "Câu ca dao “Có công mài sắt, có ngày nên kim” khuyên chúng ta điều gì?", opts: ["A. Làm việc phải thật nhanh", "B. Kiên trì, chăm chỉ sẽ thành công", "C. Làm một lần là xong", "D. Nhờ người khác làm giúp"], ans: 1, level: 2 },
        { q: "Chọn dòng gồm các từ ngữ chỉ tình cảm của người thân trong gia đình.", opts: ["A. yêu thương, chăm chỉ, quan tâm", "B. yêu thương, chăm sóc, vui chơi", "C. yêu thương, làm việc, quan tâm", "D. yêu thương, chăm sóc, quan tâm"], ans: 3, level: 2 },
        { q: "Khi gặp thầy cô giáo ở ngoài trường, em nên làm gì?", opts: ["A. Giả vờ không nhìn thấy.", "B. Chạy thật nhanh", "C. Khoanh tay, chào thầy cô lễ phép.", "D. Đợi thầy cô chào trước."], ans: 2, level: 2 },
        { q: "Khi bố mẹ đi làm về muộn, em nên làm gì?", opts: ["A. Khóc vì bố mẹ về muộn.", "B. Chạy ra chào đón và lấy nước.", "C. Vẫn tiếp tục xem phim.", "D. Giả vờ đi ngủ."], ans: 1, level: 2 },
        { q: "Khi được người lớn tặng quà, em nên làm gì?", opts: ["A. Nhận bằng hai tay và nói lời cảm ơn.", "B. Không nói gì.", "C. Không nhận quà.", "D. Nhận bằng một tay."], ans: 0, level: 2 },
        { q: "Việc làm nào thể hiện bảo quản tốt đồ dùng gia đình?", opts: ["A. Không nóng cũng mở quạt", "B. Vẽ bậy lên tường.", "C. Sử dụng tivi cả ngày", "D. Tắt điện, quạt khi ra khỏi phòng."], ans: 3, level: 2 },
        { q: "Khi em mắc lỗi em phải?", opts: ["A. Nhận lỗi và sửa lỗi.", "B. Đổ lỗi cho người khác.", "C. Không cảm thấy lo lắng.", "D. Im lặng không làm gì."], ans: 0, level: 2 },

        // MÀN 3 (Khó)
        { q: "Đèn tín hiệu giao thông gồm mấy màu?", opts: ["A. 2 màu", "B. 3 màu", "C. 4 màu", "D. 5 màu"], ans: 1, level: 3 },
        { q: "Khi bạn vô tình làm hỏng bút của em, em nên xử lý thế nào?", opts: ["A. Lập tức đánh bạn.", "B. Khóc to.", "C. Nhắc nhở bạn xin lỗi và cẩn thận hơn.", "D. Đòi bạn đền bút đắt tiền hơn."], ans: 2, level: 3 },
        { q: "Việc làm nào sau đây thể hiện sự kính trọng thầy giáo, cô giáo?", opts: ["A. Lễ phép chào hỏi khi gặp thầy cô.", "B. Thầy cô không dạy mình thì không chào.", "C. Nói chuyện riêng trong giờ học.", "D. Không học bài, không làm bài tập."], ans: 0, level: 3 },
        { q: "Khi thấy các bạn đang vẽ bậy lên tường lớp học, em nên làm gì?", opts: ["A. Tham gia vẽ cùng", "B. Đứng xem.", "C. Bỏ đi chỗ khác.", "D. Khuyên bạn dừng lại và báo giáo viên."], ans: 3, level: 3 },
        { q: "Trong những việc làm sau, việc nào KHÔNG thể hiện tình yêu đối với quê hương?", opts: ["A. Biết ơn người có công.", "B. Chăm sóc, bảo vệ thiên nhiên.", "C. Vứt rác bừa bãi, hái hoa ven đường.", "D. Cố gắng học giỏi xây dựng quê hương."], ans: 2, level: 3 },
        { q: "Việc làm nào thể hiện em biết quý trọng thời gian?", opts: ["A. Làm bài đúng giờ, không mải chơi", "B. Mải xem tivi rồi để bài tập muộn", "C. Đi học trễ vì ngủ nướng", "D. Chơi trước, bài tập để hôm sau"], ans: 0, level: 3 },
        { q: "Khi nhìn thấy bạn bị ngã xuống nước, em nên làm gì?", opts: ["A. Nhảy ngay xuống nước cứu bạn.", "B. Kêu cứu người lớn, ném phao hoặc dùng sào.", "C. Bỏ chạy đi tìm người thân.", "D. Đứng trên bờ khóc."], ans: 1, level: 3 },
        { q: "Tại sao không nên nô đùa, xô đẩy nhau gần ao, hồ, sông, suối?", opts: ["A. Vì dễ làm bẩn quần áo.", "B. Vì bị la mắng.", "C. Vì dễ trượt chân, ngã gây đuối nước.", "D. Vì làm ồn."], ans: 2, level: 3 },
        { q: "Khi bạn mới chuyển đến lớp còn rụt rè, em nên làm gì để ứng xử thân thiện?", opts: ["A. Không nói chuyện với bạn", "B. Trêu chọc bạn cho vui", "C. Chủ động chào hỏi, rủ bạn cùng chơi.", "D. Bỏ đi chơi với nhóm bạn cũ"], ans: 2, level: 3 },
        { q: "Khi ở nhà một mình, để giữ an toàn em nên làm gì?", opts: ["A. Tự ý bật bếp nấu ăn", "B. Mở cửa cho người lạ vào nhà", "C. Không nghịch điện, không mở cửa cho người lạ.", "D. Leo trèo lên cửa sổ cho thoáng"], ans: 2, level: 3 }
    ];

    // --- BIẾN TOÀN CỤC ---
    let playerName = "";
    let gameQuestions = [];
    let currentQuestionIndex = 0;
    let score = 0;
    let correctCount = 0;
    let wrongCount = 0;
    let timeSeconds = 0;
    let timerInterval;

    // Các câu nói tiếng Việt ngẫu nhiên khi đúng
    const praiseWords = ["Giỏi quá!", "Tuyệt vời!", "Đúng rồi!", "Xuất sắc!", "Quá đỉnh!"];

    // --- HÀM XỬ LÝ ---
    function switchScreen(screenId) {
        document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
        document.getElementById(screenId).classList.add('active');
    }

    function shuffleArray(array) {
        for (let i = array.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [array[i], array[j]] = [array[j], array[i]];
        }
    }

    // Khởi tạo và phân loại câu hỏi theo màn
    function prepareQuestions() {
        let level1 = allQuestions.filter(q => q.level === 1);
        let level2 = allQuestions.filter(q => q.level === 2);
        let level3 = allQuestions.filter(q => q.level === 3);
        
        shuffleArray(level1);
        shuffleArray(level2);
        shuffleArray(level3);

        gameQuestions = [...level1, ...level2, ...level3];
    }

    function formatTime(sec) {
        let m = Math.floor(sec / 60).toString().padStart(2, '0');
        let s = (sec % 60).toString().padStart(2, '0');
        return `${m}:${s}`;
    }

    function startGame() {
        let nameInput = document.getElementById('player-name').value.trim();
        if (nameInput === "") {
            alert("Em hãy nhập tên để bắt đầu nhé!");
            return;
        }
        playerName = nameInput;
        document.getElementById('player-display').innerText = "Người chơi: " + playerName;
        
        prepareQuestions();
        score = 0;
        correctCount = 0;
        wrongCount = 0;
        currentQuestionIndex = 0;
        timeSeconds = 0;

        switchScreen('screen-game');
        loadQuestion();

        // Chạy đồng hồ
        timerInterval = setInterval(() => {
            timeSeconds++;
            document.getElementById('time-display').innerText = "⏰ " + formatTime(timeSeconds);
        }, 1000);
    }

    function loadQuestion() {
        document.getElementById('btn-next').style.display = 'none';
        
        let q = gameQuestions[currentQuestionIndex];
        document.getElementById('level-display').innerText = "Màn: " + q.level + " (Câu " + (currentQuestionIndex+1) + "/30)";
        document.getElementById('question-text').innerText = q.q;

        let optionsContainer = document.getElementById('options-container');
        optionsContainer.innerHTML = '';

        q.opts.forEach((opt, index) => {
            let btn = document.createElement('button');
            btn.className = 'option-btn';
            btn.innerText = opt;
            btn.onclick = () => checkAnswer(index, btn);
            optionsContainer.appendChild(btn);
        });
    }

    // Đọc giọng nói Tiếng Việt
    function speakText(text) {
        if ('speechSynthesis' in window) {
            let msg = new SpeechSynthesisUtterance();
            msg.text = text;
            msg.lang = 'vi-VN';
            msg.rate = 1.1; // Tốc độ nói
            window.speechSynthesis.speak(msg);
        }
    }

    function checkAnswer(selectedIndex, btnElement) {
        // Khóa tất cả các nút
        let allBtns = document.querySelectorAll('.option-btn');
        allBtns.forEach(b => b.disabled = true);

        let q = gameQuestions[currentQuestionIndex];
        
        if (selectedIndex === q.ans) {
            btnElement.classList.add('correct');
            score += 10;
            correctCount++;
            document.getElementById('score-display').innerText = "Điểm: " + score;
            
            // Hiệu ứng pháo hoa
            confetti({ particleCount: 100, spread: 70, origin: { y: 0.6 } });
            
            // Đọc giọng nói random
            let randomPraise = praiseWords[Math.floor(Math.random() * praiseWords.length)];
            speakText(randomPraise);

        } else {
            btnElement.classList.add('wrong');
            wrongCount++;
            // Bôi xanh đáp án đúng để HS biết
            allBtns[q.ans].classList.add('correct');
            speakText("Sai mất rồi, cố lên em nhé!");
        }

        document.getElementById('btn-next').style.display = 'inline-block';
    }

    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < gameQuestions.length) {
            loadQuestion();
        } else {
            endGame();
        }
    }

    function endGame() {
        clearInterval(timerInterval);
        switchScreen('screen-result');
        
        document.getElementById('final-score').innerText = "Điểm của em: " + score;
        document.getElementById('final-stats').innerText = `Đúng: ${correctCount} | Sai: ${wrongCount} | Thời gian: ${formatTime(timeSeconds)}`;

        saveDataAndShowLeaderboard();
    }

    function saveDataAndShowLeaderboard() {
        // Lấy dữ liệu cũ từ LocalStorage
        let leaderBoard = JSON.parse(localStorage.getItem('quizLeaderboard')) || [];
        
        // Thêm người chơi hiện tại
        leaderBoard.push({
            name: playerName,
            score: score,
            correct: correctCount,
            wrong: wrongCount,
            time: formatTime(timeSeconds),
            rawTime: timeSeconds
        });

        // Sắp xếp: Điểm giảm dần, nếu điểm bằng thì thời gian ít hơn xếp trên
        leaderBoard.sort((a, b) => {
            if (b.score === a.score) return a.rawTime - b.rawTime;
            return b.score - a.score;
        });

        // Lưu lại vào trình duyệt
        localStorage.setItem('quizLeaderboard', JSON.stringify(leaderBoard));

        // Đổ dữ liệu ra bảng
        let tbody = document.getElementById('leaderboard-body');
        tbody.innerHTML = '';
        
        // Chỉ hiện Top 10
        leaderBoard.slice(0, 10).forEach((p, index) => {
            let tr = document.createElement('tr');
            tr.innerHTML = `
                <td>${index + 1}</td>
                <td><strong>${p.name}</strong></td>
                <td>${p.score}</td>
                <td>${p.correct}</td>
                <td>${p.wrong}</td>
                <td>${p.time}</td>
            `;
            tbody.appendChild(tr);
        });

        /* --- LƯU Ý VỀ CANVA SHEET / GOOGLE SHEET ---
           Đoạn JS này hiện đang lưu tạm vào LocalStorage của trình duyệt.
           Để đẩy dữ liệu lên Google Sheets (giống ý bạn hỏi), 
           bạn cần phải sử dụng Google Apps Script và lệnh fetch() tại đây. 
        */
    }
</script>
